<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Tanaman - DI-GADHU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --dark-green: #1f3d2b;
            --forest-green: #2f5d3a;
            --leaf-green: #4f8a5b;
            --light-green: #8ccf9b;
            --water-blue: #4aa3c7;
            --soil-brown: #8b6b4c;
            --soft-cream: #f4f1e6;
        }
        body {
            background: var(--soft-cream);
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        /* Glass Navbar */
        .glass-navbar {
            background: rgba(31, 61, 43, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .bg-fixed-cover {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: 0;
        }
        
        .scroll-content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding-top: 80px; 
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, opacity 0.6s ease;
        }
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-up {
            animation: fadeUp 0.8s ease forwards;
        }

        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body>

    <div id="bgImage" class="bg-fixed-cover"></div>

    
    <nav class="glass-navbar fixed w-full z-20 p-4 flex justify-between text-white top-0">
        <div class="flex items-center gap-2">
            <img src="Resource/Logo2.png" alt="Logo" class="w-10 h-10 object-contain">
            <h2 class="tracking-wide" style="color: var(--light-green);">DI-GADHU</h2>
        </div>
        <ul class="flex gap-6">
            <li><a href="api/mainMenu.php" class="hover:text-light-green transition">Beranda</a></li>
            <li><a href="kosong" class="hover:text-light-green transition">Budidaya</a></li>
            <li><a href="tanaman.HTML" class="hover:text-light-green transition">Jenis Tanaman</a></li>
            <li><a href="analisis.HTML" class="hover:text-light-green transition">Analisis</a></li>
        </ul>
    </nav>


    <div class="scroll-content">

        <div class="h-screen flex items-center justify-center">
            <div class="text-center text-white drop-shadow-lg px-4">
                <h1 id="plantName" class="text-5xl md:text-7xl font-bold mb-4" style="text-shadow: 2px 2px 8px rgba(0,0,0,0.5);">Memuat...</h1>
                <p class="text-xl md:text-2xl">Geser ke bawah untuk informasi detail</p>
                <div class="mt-8 animate-bounce">↓</div>
            </div>
        </div>


        <div id="detailSection" class="max-w-4xl mx-auto px-6 pb-20 opacity-0 translate-y-10 transition-all duration-700">
            <div class="glass-card p-8 md:p-10 text-white">
                <h2 class="text-3xl font-bold mb-6 border-b border-white/30 pb-2">📖 Deskripsi Lengkap</h2>
                <p id="fullDesc" class="text-lg leading-relaxed mb-8"></p>

                <div class="grid md:grid-cols-2 gap-6 mb-8">
                    <div class="bg-black/20 rounded-xl p-4 backdrop-blur-sm">
                        <h3 class="font-semibold text-xl mb-2">Suhu Ideal</h3>
                        <p id="suhu" class="text-2xl font-light"></p>
                    </div>
                    <div class="bg-black/20 rounded-xl p-4 backdrop-blur-sm">
                        <h3 class="font-semibold text-xl mb-2">Kelembaban</h3>
                        <p id="kelembaban" class="text-2xl font-light"></p>
                    </div>
                    <div class="bg-black/20 rounded-xl p-4 backdrop-blur-sm">
                        <h3 class="font-semibold text-xl mb-2">Jenis Tanah</h3>
                        <p id="tanah" class="text-lg"></p>
                    </div>
                    <div class="bg-black/20 rounded-xl p-4 backdrop-blur-sm">
                        <h3 class="font-semibold text-xl mb-2">Musim Tanam</h3>
                        <p id="musim" class="text-lg"></p>
                    </div>
                </div>

                <div class="bg-black/20 rounded-xl p-5 backdrop-blur-sm">
                    <h3 class="font-semibold text-2xl mb-3">Keunggulan</h3>
                    <p id="keunggulan" class="text-lg leading-relaxed"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="detailTanaman.js"></script>
    <script>

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.remove('opacity-0', 'translate-y-10');
                    entry.target.classList.add('animate-fade-up');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.2 });
        observer.observe(document.getElementById('detailSection'));
    </script>
</body>
</html>
